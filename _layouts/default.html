<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width,initial-scale=1">
        <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
        <meta name="description" content="{{ page.description | default: site.description }}">
        <title>
            {% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}
        </title>

        {% if site.url %}
        <link rel="canonical" href="{{ page.url | absolute_url }}">
        {% endif %}

        <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ '/feed.xml' | absolute_url }}">
        <link rel="alternate" type="application/atom+xml" title="{{ site.title }}" href="{{ '/atom.xml' | absolute_url }}">

        <meta property="og:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
        <meta property="og:description" content="{{ page.description | default: site.description }}">
        <meta property="og:url" content="{{ page.url | absolute_url }}">
        <meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}">
        <meta property="og:site_name" content="{{ site.title }}">
        {% if page.image %}
        <meta property="og:image" content="{{ page.image | absolute_url }}">
        {% endif %}
        {% if page.date %}
        <meta property="article:published_time" content="{{ page.date | date_to_xmlschema }}">
        {% endif %}

        <meta name="twitter:card" content="{% if page.image %}summary_large_image{% else %}summary{% endif %}">
        <meta name="twitter:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
        <meta name="twitter:description" content="{{ page.description | default: site.description }}">

        <link rel="stylesheet" href="/css/style.css">
        {% if page.layout == 'post' %}
        <link rel="stylesheet" href="/css/print.css" media="print">
        {% endif %}
    </head>
    <body>
        <div class="layout-wrapper">
            <header class="site-header">
                <div class="header-inner">
                    <h1 class="site-title">
                        <a href="/">{{ site.title }}</a>
                    </h1>
                    <button class="menu-toggle" aria-label="Toggle menu" aria-expanded="false">
                        <span></span>
                    </button>
                    <nav class="main-nav">
                        <a href="/">Home</a>
                        <a href="/recipes/">All Recipes</a>
                        <a href="/about/">About</a>
                        <a href="/now-reading/">Now Reading</a>
                    </nav>
                </div>
            </header>
            <div class="menu-overlay"></div>
            
            <main class="main-content">
                <div class="content-inner">
                    {{ content }}
                </div>
            </main>
            
            <footer class="site-footer">
                {% include _footer.html %}
            </footer>
        </div>
        
        <script>
            document.addEventListener('DOMContentLoaded', function() {
                const menuToggle = document.querySelector('.menu-toggle');
                const mainNav = document.querySelector('.main-nav');
                const menuOverlay = document.querySelector('.menu-overlay');
                
                function toggleMenu() {
                    const isOpen = mainNav.classList.toggle('open');
                    menuToggle.classList.toggle('active');
                    menuToggle.setAttribute('aria-expanded', isOpen);
                    menuOverlay.classList.toggle('active');
                    document.body.style.overflow = isOpen ? 'hidden' : '';
                }
                
                function closeMenu() {
                    mainNav.classList.remove('open');
                    menuToggle.classList.remove('active');
                    menuToggle.setAttribute('aria-expanded', 'false');
                    menuOverlay.classList.remove('active');
                    document.body.style.overflow = '';
                }
                
                menuToggle.addEventListener('click', toggleMenu);
                menuOverlay.addEventListener('click', closeMenu);
                
                document.addEventListener('keydown', function(e) {
                    if (e.key === 'Escape') closeMenu();
                });
            });
        </script>
    </body>
</html>
